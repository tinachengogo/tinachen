<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gogolooker-pages · 靜態網頁總覽</title>
    <style>
      :root {
        --ground: #faf3f2;
        --ink: #1c1c1c;
        --muted: #6b6b6b;
        --red: #cc1517;
        --red-dk: #a01012;
        --red-lt: #f8cdcd;
        --line: #ecdcdc;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--ground);
        color: var(--ink);
        font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      .wrap { max-width: 760px; margin: 0 auto; padding: 72px 24px 64px; }
      .eyebrow {
        display: inline-block;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--red);
        background: var(--red-lt);
        padding: 6px 14px;
        border-radius: 999px;
      }
      h1 {
        font-size: clamp(28px, 5vw, 42px);
        font-weight: 800;
        letter-spacing: -0.02em;
        margin: 18px 0 10px;
      }
      .lede { color: var(--muted); margin: 0 0 36px; font-size: 16px; }
      .list { display: flex; flex-direction: column; gap: 16px; }
      a.card {
        display: flex;
        align-items: center;
        gap: 18px;
        text-decoration: none;
        color: inherit;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 22px 24px;
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      }
      a.card:hover {
        transform: translateY(-2px);
        border-color: var(--red-lt);
        box-shadow: 0 16px 30px -20px rgba(204, 21, 23, 0.4);
      }
      a.card:focus-visible { outline: 3px solid var(--red); outline-offset: 2px; }
      .mark {
        flex: 0 0 auto;
        width: 46px;
        height: 46px;
        border-radius: 12px;
        background: var(--red);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 20px;
      }
      .card h2 { margin: 0 0 2px; font-size: 18px; font-weight: 700; }
      .card p { margin: 0; color: var(--muted); font-size: 14px; }
      .arrow { margin-left: auto; color: var(--red); font-size: 22px; }
      footer {
        margin-top: 48px;
        padding-top: 20px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <span class="eyebrow">gogolooker-pages</span>
      <h1>靜態網頁總覽</h1>
      <p class="lede">這個頁面收錄不同任務的靜態網頁產出，點擊進入各專案。</p>

      <div class="list">
        <a class="card" href="./scamadviser-red-preview/">
          <span class="mark">SA</span>
          <span>
            <h2>ScamAdviser 紅色改版預覽</h2>
            <p>首頁紅色版視覺、色彩系統與各區塊細節（實機畫面）</p>
          </span>
          <span class="arrow" aria-hidden="true">&rsaquo;</span>
        </a>
      </div>

      <footer>主色 #CC1517 · 由 ScamAdviser Lens 改版任務產出</footer>
    </main>
  </body>
</html>
